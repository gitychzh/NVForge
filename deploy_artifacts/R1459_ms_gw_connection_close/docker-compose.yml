      # budget=64对齐UPSTREAM_TIMEOUT给单key完整成功路径(3-14s正常,偶发慢30s). 铁律:只改HM1不改HM2.
      # R830b (2026-07-09, HM1 self): 64→96. 根因(飞书"回答一句卡住"): metrics实测 glm5_2_nv integrate
      # 成功请求 max=71.3s p95=62.4s, 而 thinking override=NVU_FORCE_STREAM_UPGRADE_TIMEOUT=66s 太紧,
      # 67s 的偶发慢请求被砍成 timeout → fastbreak=1 放弃整 integrate tier → 切 pexec(对glm5.2全empty200
      # 不可用, R832d) → 级联 ms_gw 56s timeout → 飞书 lane 120s 杀. budget 64 < override 66 也是病
      # (单 key 就烧光 budget). 配合新增 NVU_INTEGRATE_THINKING_TIMEOUT_S=90 (integrate 专属, 见下),
      # budget=96 容纳 1 次 90s 慢思考 + 切换余量; 失败时 fastbreak=1 立即退不级联. 铁律:只改HM1不改HM2.
      NVU_TIER_BUDGET_GLM5_2_NV: "96"
      # R835 (2026-07-10, HM1 self): minimax_m3_nv integrate 专属 tier budget.
      # 背景: minimax reasoning_effort=high 实测 ~156s, 但全局 TIER_TIMEOUT_BUDGET_S=112s 会砍掉 → 502.
      # pexec 路径早有 NVU_TIER_BUDGET_{model} override (upstream.py:503), integrate 路径之前没有 (R834 审计
      # P2-8). R835 给 integrate 也加了 per-model override (upstream.py:185), 此 env 配 minimax=180s.
      # 不影响 glm5.2 (有专属 96) 和 dsv4p/kimi (走 pexec, 不经 integrate). 铁律:只改HM1不改HM2.
      NVU_TIER_BUDGET_MINIMAX_M3_NV: "100"  # R1035 (HM2->HM1): BUDGET 110->100 (-10s). minimax_m3_nv 7 ATE avg 154s in 6h (no ms_gw rescue), integrate thinking=90s + FASTBREAK=1 = ~90s key abort. 100s cuts 10s headroom per ATE while >90s safe. Empty FALLBACK_GRAPH should route dsv4p ATEs via ms_gw. Single param; iron rule: only change HM1 never HM2
      NVU_TIER_BUDGET_DSV4P_NV: "66"  # R1333 (HM2→HM1): BUDGET 72→78 (+6s). 6h: 106req/93OK(87.7%)/13fail. dsv4p_nv 6 ATE avg 71.7s — k5 empty_200→k1 timeout→fastbreak at ~72s budget exhaustion (5s min threshold violated). +6s gives 78-62=16s remaining after k1 504 connect, enabling k2/k3 full attempt. 7 zombie_empty_completion glm5_2_nv code-level not config-fixable. ms_gw relay TimeoutError 213-233s code-level streaming sync defect. pexec 100% SR(48/48). ms_gw 94.4% SR. Single param; iron rule: only change HM1 never HM2.  R1116 (HM2->HM1): BUDGET 66->72 (+6s). 6h: 136req/122OK(89.7%SR)/14fail. dsv4p_nv ATE k4 empty_200 at 61.1s -> budget 66s exhausted (4.9s < 5s min) -> ms_gw BrokenPipeError. EMPTY_200_FASTBREAK=2 is code-level no-op (R1039). +6s gives k5 budget for rescue within tier, avoiding ms_gw BrokenPipeError. 72 < BUDGET=198 safe. Single param; iron rule: only change HM1 never HM2.
      # R835b (2026-07-10, HM1 self): 流式总 deadline. 背景: conn.sock.settimeout 是 per-read socket 超时,
      # 但 SSE upstream 持续发 keep-alive chunk (每次都在 read_timeout 窗口内) → 单次 read 永不超时 →
      # 流永不中断 → openclaw 等流结束等到 abort → ms_gw 再 abort 双杀 (R834 审计 P0 铁证: 流持续 102s).
      # 加总 deadline: 超过就 break + 记 error_type=stream_total_deadline, 不再喂饭式等.
      # 设 66s: 对齐 UPSTREAM_TIMEOUT=66, 消除 42s 过早截断导致的 stream_total_deadline 错误
      # 设 66s: < openclaw nv_gw provider timeoutSeconds=120s (R835a→R1028 drift correction), 66s << 120s safe; align with UPSTREAM=66
      # NVU_INTEGRATE_THINKING_TIMEOUT_S=90 per-attempt 管, 此 deadline 兜的是"流已开始但持续不结束"的僵尸流.
      NVU_STREAM_TOTAL_DEADLINE_S: "42"  # R839 (HM1 self): 90→42. R835b 原意就是 42s (治"流已开始后的喂饭卡死"). 90s 后期被 R1038 改回兼容 thinking 慢, 但 thinking 慢是 ttfb 慢 (由 NVU_INTEGRATE_THINKING_TIMEOUT_S=90 per-attempt 管), 不是首字节后慢; 首字节后还卡 90s 纯属过长. 42<45s 正好卡在 openclaw timeout 之前主动断流让 fallback 跑. 配合 F2 首字节前 deadline (NVU_STREAM_FIRST_BYTE_DEADLINE_S) 分工互补: 首字节前由 FIRST_BYTE 管, 首字节后由 TOTAL(idle) 管.
      # R830b (2026-07-09, HM1 self): integrate 专属 thinking timeout override. handlers.py 对 thinking
      # 请求传 upstream_timeout_override=NVU_FORCE_STREAM_UPGRADE_TIMEOUT(=66s), 但该 env 是 integrate +
      # pexec 共用; 放宽它会让 pexec(dsv4p/kimi 失败兜底)也晚放弃. 本 env 仅 _try_integrate_keys 读取
      # (upstream.py R830b), 覆盖传入 override; pexec 路径不受影响. 90s 覆盖实测 max 71.3s + 18s 余量.
      NVU_INTEGRATE_THINKING_TIMEOUT_S: "90"
      # R839 (HM1 self): 首字节前绝对 deadline. 兜 "upstream 返回 200 头但 body 首字节永不来" 场景
      # (R835b idle deadline 盲区: 它只在首字节后设置, 首字节没到时 deadline 永不被设, 只能靠 90s
      # per-attempt socket timeout 兜底太长). 20s 内没收到首字节就 break + 记 stream_first_byte_timeout.
      # 与 NVU_STREAM_TOTAL_DEADLINE_S(首字节后 idle 42s) 分工互补, 互不重叠.
      NVU_STREAM_FIRST_BYTE_DEADLINE_S: "20"
      # R830c (2026-07-09, HM1 self): integrate 专属 fastbreak 阈值, 解绑 pexec. 专家评审(glm5.2+dsv4p共识):
      # fastbreak=1 让 integrate 5key 只试1个就放弃整 tier, 单点 thinking 慢(40-71s)连累全局. 改2: 允许2次
      # timeout 再放弃 tier, 给5key轮换机会. 仅 _try_integrate_keys 读(line~160, 默认回退 NVU_PEXEC_TIMEOUT_FASTBREAK);
      # pexec 路径(_try_tier_keys line~508)仍读 NVU_PEXEC_TIMEOUT_FASTBREAK=1 不变, 保护 dsv4p/kimi 精调.
      NVU_INTEGRATE_TIMEOUT_FASTBREAK: "1"
      # R830c-linkage (2026-07-09, HM1 self): 超时层级关系(不改参数, 仅标注约束, 供后续调参不打架):
      # openclaw.json providers.nv_gw.timeoutSeconds=100 (第一道闸, openclaw model-fetch requestTimeoutMs)
      #   └ nv_gw UPSTREAM_TIMEOUT=66 (默认 per-key 头超时)
      #   └ NVU_INTEGRATE_THINKING_TIMEOUT_S=90 (integrate 专属 override, 覆盖上面 66)
      #   └ NVU_TIER_BUDGET_GLM5_2_NV=96 (单 tier 总预算, 含多 key 轮换)
      #   └ ms_gw fallback NVU_MS_GW_TIMEOUT=45 (第二 provider, 仅 primary 熔断后触发)
      # openclaw compaction.timeoutSeconds=120 (lane 兜底杀). provider timeoutSeconds 是单 fetch 超时, 失败后切
      # 下一个 provider. 最坏理论: nv_gw fetch 100s + ms_gw fetch 50s = 150s > 120s lane. 但实际 nv_gw 内部
      # integrate 90s override + fastbreak=2 会在 ~90s 内放弃整 tier 切 ms_gw(ms_gw 50s) approx 140s, 仍可能触 lane.
      # 这是可接受的最后兜底: lane 120s 杀总比 135s 僵死(line603 case) 强, 至少 stall-watcher 会兜底重启.
      # 实测 integrate p50=14s p95=62s max=71s 正常远不触 100s; 100s 只拦偶发 135s 僵死. 铁律:只改HM1不改HM2.
      # R832c (HM1 self): ms_gw fallback timeout 30→45. 日志显示ms_gw relay实际62s才失败(30s被某处覆盖),
      # 45s放宽兜底. 但primary修好后少fallback到ms_gw. ms_gw本身ModelScope surge本机改不动后端.
      NVU_MS_GW_FALLBACK_TIMEOUT: 120  # R1459 (HM2→HM1): ms_gw fallback timeout 280→120. Code fix: added Connection:close header to ms_gw fallback request (R1459 code patch in handlers.py). ms_gw responds 2-5s per DB. 120s gives 24x margin. 66s tier budget + 120s = 186s < 360s PROXY_TIMEOUT safe. Iron rule: only change HM1 never HM2.
      NVU_MS_GW_FALLBACK_MODELMAP: "glm5_2_nv:glm5_2_ms,kimi_nv:kimi_ms,dsv4p_nv:dsv4p_ms"  # R1275 (HM2->HM1): add dsv4p_nv->dsv4p_ms fallback. 3 dsv4p ATEs/6h had zero ms_gw rescue (MODELMAP missing dsv4p). ms_gw dsv4p_ms ACTIVE (10 variants, 17 confirms). BUDGET 210-72=138s headroom. Single-param: MODELMAP extension
    <<: *resource-1c1g-host
    volumes:
      - ./proxy/nv-gw/gateway:/app/gateway   # unify-nv Layer1: 源码挂载(对齐HM2), 改 .py 只需 restart 不再 rebuild
      - ./logs/nv_gw:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 40006:40006
    networks:
      - cc-net
    dns:              # R748: 强制用阿里 DNS, 避 ECS 返亚太挂死节点 (glm5_2思考在亚太节点504/202挂死, 美国节点稳定)
      - 223.5.5.5
      - 223.6.6.6
    # R38.12: No depends_on LiteLLM containers — nv_gw no longer routes through them.
    # LiteLLM 41101-41105 kept running as manual fallback (can add back depends_on if needed).
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:40006/health')" || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging

  cc4101:
    build: ./proxy/cc4101
    image: cc-infra-cc4101
    container_name: cc4101
    restart: unless-stopped
    ports:
    - 127.0.0.1:4101:4101
    environment:
    - LISTEN_PORT=4101
    - PROXY_ROLE=cc4101
    - AUTH_ENABLED=1
    - UPSTREAM_TIMEOUT=30  # R829: 120->30. integrate链路p90<15s, 120s遇SSL卡死致CC mid-response僵2min, 30s快速断触发重试
    - UPSTREAM_IDLE_TIMEOUT=150  # R830: body read idle超时(两次chunk间隔), 对齐nv_gw thinking 150s, 容纳长思考静默期
    - PYTHONUNBUFFERED=1  # R830: 消除stdout buffer迟滞, docker logs实时可见(对齐ms_gw/nv_gw虽未设但实测实时)
    - PRIMARY_UPSTREAM_URL=http://nv_gw:40006/v1/chat/completions
    - PRIMARY_UPSTREAM_TOKEN=nv-gw-token
    - PRIMARY_UPSTREAM_MODEL=glm5_2_nv
    - CC4101_GATEWAY_API_KEY=cc4101-token
    - CC4101_DB_ENABLED=1
    - CC4101_DB_HOST=logs_db
    - CC4101_DB_PORT=5432
    - CC4101_DB_USER=litellm
    - CC4101_DB_PASSWORD=${POSTGRES_PASSWORD}  # R1442: 部署cc4101到HM1(从HM2移植); 密码对齐HM1用\${POSTGRES_PASSWORD}, 非HM2固定值
    - CC4101_DB_NAME=hermes_logs
    - CC4101_HOST_MACHINE=opcsname
    - LOG_RETENTION_DAYS=14
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    volumes:
    - ./proxy/cc4101/gateway:/app/gateway
    - ./logs/cc4101:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - nv_gw
    - ms_gw
    - logs_db
    networks:
    - cc-net
    mem_limit: 1g

networks:
  cc-net:
    driver: bridge

volumes:
  cc_pgdata:
