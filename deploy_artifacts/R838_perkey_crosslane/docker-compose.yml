services:
  logs_db:
    image: postgres:16-alpine
    container_name: logs_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: litellm_pg_pass
      POSTGRES_USER: litellm
      POSTGRES_DB: litellm
      POSTGRES_MULTIPLE_DATABASES: litellm_nv_hm hermes_logs
      TZ: Asia/Shanghai
    volumes:
    - cc_pgdata:/var/lib/postgresql/data
    - ./postgres/init-db.sh:/docker-entrypoint-initdb.sh:ro
    - ./postgres/hermes-logs-schema.sql:/docker-entrypoint-initdb.d/20-hermes-logs-schema.sql:ro
    - /etc/localtime:/etc/localtime:ro
    networks:
    - cc-net
    mem_limit: 1g
  nv_gw:
    build: ./proxy/nv-gw
    image: cc-infra-nv_gw
    container_name: nv_gw
    restart: unless-stopped
    ports:
    - 40006:40006
    environment:
    - LISTEN_PORT=40006
    - PROXY_ROLE=passthrough
    - PROXY_TIMEOUT=300
    - UPSTREAM_TIMEOUT=66
    - TIER_TIMEOUT_BUDGET_S=180
    - MIN_OUTBOUND_INTERVAL_S=0
    - KEY_COOLDOWN_S=25
    - TIER_COOLDOWN_S=25
    - NVU_CONNECT_RESERVE_S=0
    - NVU_FORCE_STREAM_UPGRADE=0
    - NVU_FORCE_STREAM_UPGRADE_TIMEOUT=150
    - NVU_EMPTY_200_FASTBREAK=3        # R824: 1→3. R798 的 1 是 dsv4p 全 key surge 期防 125s; 现 k1 单 key empty200(60s空) 而 k2-k5 秒回, threshold=1 让一坏 key 拖垮全 tier+60s 浪费. 3=连续3不同key空才真坏
    - NVU_PEXEC_TIMEOUT_FASTBREAK=3
    - NVU_SSLEOF_RETRY_DELAY_S=1.0
    - NVU_PEER_FALLBACK_ENABLED=1
    - NVU_PEER_FALLBACK_URL=http://100.109.153.83:40006
    - NVU_PEER_FALLBACK_TIMEOUT=25
    - NVU_TIER_BUDGET_GLM5_2_NV=70        # R797: glm-5.2 NVCF DEGRADING, 短 budget 快速失败→ms_gw
    - NVU_TIER_BUDGET_DSV4P_NV=70        # R799:130 → R801:70. NVCF 74f02205 持续504 SR=0%(20min), 1key即break 省60s. NVCF恢复改回130
    - NVU_PEER_FB_SKIP_MODELS=glm5_2_nv,dsv4p_nv  # R797+R800: peer 同 NVCF 504, 跳过 peer-fb 省 25s
    - NVU_HOST_MACHINE=opc2sname
    - NVCF_BASE_URL=api.nvcf.nvidia.com
    - NVCF_DEEPSEEK_FUNCTION_ID=74f02205-c7ba-438f-b81a-2537955bd7ec
    - NVCF_GLM52_FUNCTION_ID=3b9748d8-1d85-40e8-8573-0eeaa63a4b63
    - NVCF_KIMI_FUNCTION_ID=f966661c-790d-4f71-b973-c525fb8eafd4
    - NV_INTEGRATE_MODELS=glm5_2_nv           # R827: 开启 glm5_2 integrate 路径(原为空)
    - NV_INTEGRATE_PROXY_URLS=socks5h://172.18.0.1:7894,socks5h://172.18.0.1:7895,socks5h://172.18.0.1:7896,socks5h://172.18.0.1:7897,socks5h://172.18.0.1:7899  # R838: 5美国出口轮换(多样性), 测速7897>7899>7896>7894>7895
    - NV_INTEGRATE_EGRESS_IPS=134.195.101.193,134.195.101.193,134.195.101.195,134.195.101.193,134.195.101.180  # R838: 5端口egress标签(实际出口随mihomo漂移,标签仅DB记录用)
    - NV_INTEGRATE_KEY_COOLDOWN_S=0
    # R838: per-key 跨链路. 仅 dsv4p_nv 的 K5 先试 integrate(美国7897), 失败回退 pexec直连.
    # kimi_nv 不参与(integrate端点对kimi-k2.6全key 404 Not-found-for-account, 只能pexec).
    - NV_KEY_INTEGRATE_KEYS=dsv4p_nv:5
    - NV_KEY_INTEGRATE_PROXY_URLS=socks5h://172.18.0.1:7897  # 7897 综合测速最快(nvidia436ms+glm5.2 2.7s)
    - NV_KEY_INTEGRATE_EGRESS_IPS=134.195.101.193
    - NVU_KEY1=${NVU_KEY1}
    - NVU_KEY2=${NVU_KEY2}
    - NVU_KEY3=${NVU_KEY3}
    - NVU_KEY4=${NVU_KEY4}
    - NVU_KEY5=${NVU_KEY5}
    - NVU_PROXY_URL1=
    - NVU_PROXY_URL2=
    - NVU_PROXY_URL3=
    - NVU_PROXY_URL4=
    # R793: K4 也改直连, 去掉 mihomo 7897. K4 出口 = HM2 直连 IP 218.93.250.242 (与 K2 同出口). 5 key 全直连, 与 HM1 对称. R_direct: 用户授权两机全直连.
    - NVU_PROXY_URL5=
    # R784: per-key egress IP (for DB nv_requests.egress_ip, long-term IP-diversity analysis)
    # K1/K3/K5 = mihomo 美国 134.195.101.x | K2 = direct 电信 218.93.250.242 | K4 = mihomo 日本CMI 103.62.49.162
    - NVU_EGRESS_IP1=134.195.101.193
    - NVU_EGRESS_IP2=218.93.250.242
    - NVU_EGRESS_IP3=134.195.101.195
    - NVU_EGRESS_IP4=218.93.250.242
    - NVU_EGRESS_IP5=134.195.101.180
    - NVU_GATEWAY_API_KEY=nv-gw-token
    - NVU_DB_ENABLED=1
    - NVU_DB_HOST=logs_db
    - NVU_DB_PORT=5432
    - NVU_DB_USER=litellm
    - NVU_DB_PASSWORD=litellm_pg_pass
    - NVU_DB_NAME=hermes_logs
    - CHARS_PER_TOKEN_ESTIMATE=3.0
    - LOG_RETENTION_DAYS=7
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    - KEY_AUTHFAIL_COOLDOWN_S=60
    volumes:
    - ./proxy/nv-gw/gateway:/app/gateway
    - ./logs/nv_gw:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - logs_db
    networks:
    - cc-net
    mem_limit: 1g
  ms_gw:
    build: ./proxy/ms-gw
    image: cc-infra-ms_gw
    container_name: ms_gw
    restart: unless-stopped
    ports:
    - 40007:40007
    environment:
    - LISTEN_PORT=40007
    - PROXY_ROLE=ms_uni
    - PROXY_TIMEOUT=600
    - UPSTREAM_TIMEOUT=300
    - MIN_OUTBOUND_INTERVAL_S=2.0  # R806: was 1.0, raise to ease aliyun limit_burst_rate (ms_gw cycle root cause)
    - KEY_COOLDOWN_S=60
    - VARIANT_COOLDOWN_S=30
    - EMPTY_200_FASTBREAK_THRESHOLD=3  # R900 (HM2→HM1): 5→3 (-2). ms_gw 日志 req 88027738 跨 2 variant 各 5 次 empty200 循环 → 10次空请求, 浪费 ~9s. 降至3节省 4次空循环(每 variant 40%), 更早切键/切variant. FASTBREAK floor=1, 3仍有保守余地. ms_gw 流量极低 (~1req/5h), 零风险. Single param per round; iron rule: only change HM1 never HM2.
    - ALL_EXHAUSTED_COOLDOWN_S=30
    - NUM_KEYS=7
    - NUM_VARIANTS=10
    - DEFAULT_MODEL=glm5_2_ms
    - MS_BASEURL=https://api-inference.modelscope.cn/v1
    - MS_KEY1=ms-bb4e5bee-ca0e-49be-8de3-2347a57752f5
    - MS_KEY2=ms-b836c297-9cb3-45f7-86b3-a33e1b76f48f
    - MS_KEY3=ms-202e8dc3-b2f0-4aa3-9b56-0fa6798ac5b9
    - MS_KEY4=ms-ed773f9d-9ca1-4fd9-87e4-b6acd0e545ae
    - MS_KEY5=ms-69d3fbc6-6938-4fb1-b403-dfa44a05fb0c
    - MS_KEY6=ms-e392cb51-9637-4766-80aa-490a6044294c
    - MS_KEY7=ms-20761627-ec32-497c-a11a-7ff580617f0b
    - MSU_GATEWAY_API_KEY=ms-gw-token
    - MSU_DB_ENABLED=1
    - MSU_DB_HOST=logs_db
    - MSU_DB_PORT=5432
    - MSU_DB_USER=litellm
    - MSU_DB_PASSWORD=litellm_pg_pass
    - MSU_DB_NAME=hermes_logs
    - MSU_HOST_MACHINE=opc2sname
    - LOG_RETENTION_DAYS=7
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    volumes:
    - ./proxy/ms-gw/gateway:/app/gateway
    - ./logs/ms_gw:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - logs_db
    networks:
    - cc-net
    mem_limit: 1g
  cc4101:
    build: ./proxy/cc4101
    image: cc-infra-cc4101
    container_name: cc4101
    restart: unless-stopped
    ports:
    - 127.0.0.1:4101:4101
    environment:
    - LISTEN_PORT=4101
    - PROXY_ROLE=cc4101
    - AUTH_ENABLED=1
    - UPSTREAM_TIMEOUT=30  # R829: 120->30. integrate链路p90<15s, 120s遇SSL卡死致CC mid-response僵2min, 30s快速断触发重试
    - UPSTREAM_IDLE_TIMEOUT=150  # R830: body read idle超时(两次chunk间隔), 对齐nv_gw thinking 150s, 容纳长思考静默期
    - PYTHONUNBUFFERED=1  # R830: 消除stdout buffer迟滞, docker logs实时可见(对齐ms_gw/nv_gw虽未设但实测实时)
    - PRIMARY_UPSTREAM_URL=http://nv_gw:40006/v1/chat/completions
    - PRIMARY_UPSTREAM_TOKEN=nv-gw-token
    - PRIMARY_UPSTREAM_MODEL=glm5_2_nv
    - FALLBACK_UPSTREAM_URL=http://ms_gw:40007/v1/chat/completions
    - FALLBACK_UPSTREAM_TOKEN=ms-gw-token
    - FALLBACK_UPSTREAM_MODEL=glm5_2_ms  # R805: was dsv4p_ms, switch to same-model ms_gw glm (NV glm5.2 DEGRADED)
    - CC4101_GATEWAY_API_KEY=cc4101-token
    - CC4101_DB_ENABLED=1
    - CC4101_DB_HOST=logs_db
    - CC4101_DB_PORT=5432
    - CC4101_DB_USER=litellm
    - CC4101_DB_PASSWORD=litellm_pg_pass
    - CC4101_DB_NAME=hermes_logs
    - CC4101_HOST_MACHINE=opc2sname
    - LOG_RETENTION_DAYS=14
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    volumes:
    - ./proxy/cc4101/gateway:/app/gateway
    - ./logs/cc4101:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - nv_gw
    - ms_gw
    - logs_db
    networks:
    - cc-net
    mem_limit: 1g
  cx4102:
    build: ./proxy/cx-gw
    image: cc-infra-cx4102
    container_name: cx4102
    restart: unless-stopped
    ports:
    - 127.0.0.1:4102:4102
    environment:
    - LISTEN_PORT=4102
    - AUTH_ENABLED=1
    - PROXY_TIMEOUT=120
    - PRIMARY_URL=http://nv_gw:40006/v1
    - PRIMARY_MODEL=glm5_2_nv
    - FALLBACK_URL=http://ms_gw:40007/v1
    - FALLBACK_MODEL=glm5_2_ms
    - FALLBACK_TIMEOUT_S=120
    - PRIMARY_STREAM_TIMEOUT_S=150
    - CIRCUIT_FAILURE_THRESHOLD=3
    - CIRCUIT_OPEN_S=60
    - FALLBACK_RECOVER_S=30
    - NV_GW_API_KEY=nv-gw-token
    - MS_GW_API_KEY=ms-gw-token
    - CX_GATEWAY_API_KEY=cx-gw-token
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    volumes:
    - ./proxy/cx-gw/gateway:/app/gateway
    - ./logs/cx4102:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - nv_gw
    - ms_gw
    networks:
    - cc-net
    mem_limit: 512m
  opclaw4103:
    build: ./proxy/cc-adapter
    image: cc-adapter:latest
    container_name: opclaw4103
    restart: unless-stopped
    ports:
    - 127.0.0.1:4103:4103
    environment:
    - LISTEN_PORT=4103
    - ADAPTER_NAME=opclaw4103
    - ADAPTER_ROLE=cc-adapter
    - AUTH_ENABLED=1
    - PROXY_TIMEOUT=240
    - PRIMARY_URL=http://nv_gw:40006/v1
    - PRIMARY_MODEL=glm5_2_nv
    - FALLBACK_URL=http://ms_gw:40007/v1
    - FALLBACK_MODEL=glm5_2_ms
    - FALLBACK_ENABLED=1
    - FALLBACK_TIMEOUT_S=240
    - PRIMARY_STREAM_TIMEOUT_S=90
    - CIRCUIT_FAILURE_THRESHOLD=5  # R826: 2->5 放宽, 避免偶发empty200就OPEN全程跳primary
    - CIRCUIT_OPEN_S=60  # R826: 300->60 熔断恢复更快
    - FALLBACK_RECOVER_S=120
    - NV_GW_API_KEY=nv-gw-token
    - MS_GW_API_KEY=ms-gw-token
    - ADAPTER_API_KEY=opclaw-gw-token
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    - PROMPT_TOKEN_LIMIT=120000
    - SUPPLEMENT_REASONING_AS_CONTENT=1
    volumes:
    - ./proxy/cc-adapter/gateway:/app/gateway
    - ./logs/opclaw4103:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - nv_gw
    - ms_gw
    networks:
    - cc-net
    mem_limit: 512m
  hm4104:
    build: ./proxy/cc-adapter
    image: cc-adapter:latest
    container_name: hm4104
    restart: unless-stopped
    ports:
    - 127.0.0.1:4104:4104
    environment:
    - LISTEN_PORT=4104
    - ADAPTER_NAME=hm4104
    - ADAPTER_ROLE=cc-adapter
    - AUTH_ENABLED=1
    - PROXY_TIMEOUT=240
    - PRIMARY_URL=http://nv_gw:40006/v1
    - PRIMARY_MODEL=dsv4p_nv
    - FALLBACK_URL=http://ms_gw:40007/v1
    - FALLBACK_MODEL=dsv4p_ms
    - FALLBACK_ENABLED=1
    - FALLBACK_TIMEOUT_S=120
    - PRIMARY_STREAM_TIMEOUT_S=90
    - CIRCUIT_FAILURE_THRESHOLD=2
    - CIRCUIT_OPEN_S=300
    - FALLBACK_RECOVER_S=120
    - NV_GW_API_KEY=nv-gw-token
    - MS_GW_API_KEY=ms-gw-token
    - ADAPTER_API_KEY=hm-gw-token
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    volumes:
    - ./proxy/cc-adapter/gateway:/app/gateway
    - ./logs/hm4104:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - nv_gw
    - ms_gw
    networks:
    - cc-net
    mem_limit: 512m
  oc4105:
    build: ./proxy/cc-adapter
    image: cc-adapter:latest
    container_name: oc4105
    restart: unless-stopped
    ports:
    - 127.0.0.1:4105:4105
    environment:
    - LISTEN_PORT=4105
    - ADAPTER_NAME=oc4105
    - ADAPTER_ROLE=cc-adapter
    - AUTH_ENABLED=1
    - PROXY_TIMEOUT=300
    - PRIMARY_URL=http://nv_gw:40006/v1
    - PRIMARY_MODEL=kimi_nv
    - FALLBACK_URL=http://ms_gw:40007/v1
    - FALLBACK_MODEL=glm5_2_ms
    - FALLBACK_ENABLED=0
    - FALLBACK_TIMEOUT_S=300
    - PRIMARY_STREAM_TIMEOUT_S=150
    - CIRCUIT_FAILURE_THRESHOLD=3
    - CIRCUIT_OPEN_S=60
    - FALLBACK_RECOVER_S=30
    - NV_GW_API_KEY=nv-gw-token
    - MS_GW_API_KEY=ms-gw-token
    - ADAPTER_API_KEY=oc-gw-token
    - LOG_DIR=/app/logs
    - TZ=Asia/Shanghai
    volumes:
    - ./proxy/cc-adapter/gateway:/app/gateway
    - ./logs/oc4105:/app/logs
    - /etc/localtime:/etc/localtime:ro
    depends_on:
    - nv_gw
    networks:
    - cc-net
    mem_limit: 512m
networks:
  cc-net:
    driver: bridge
volumes:
  cc_pgdata: null
